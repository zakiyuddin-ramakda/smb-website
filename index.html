<!DOCTYPE html>
<html>
<head>
    <title>SMB Fashion Wear</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .navbar {
            background: black;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .hero {
            padding: 40px;
            text-align: center;
            background: #222;
            color: white;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cart {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>SMB Fashion Wear</div>
    <div>Cart: <span id="cart-count">0</span></div>
</div>

<div class="hero">
    <h1>Latest Fashion Collection 👕</h1>
</div>

<div class="products">

    <div class="card">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button onclick="addToCart('T-Shirt', 499)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Jeans</h3>
        <p>₹999</p>
        <button onclick="addToCart('Jeans', 999)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Shirt</h3>
        <p>₹699</p>
        <button onclick="addToCart('Shirt', 699)">Add to Cart</button>
    </div>

</div>

<div class="cart">
    <h2>🛒 Cart Items</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;

    document.getElementById("cart-count").innerText = cart.length;

    let list = document.getElementById("cart-items");
    let item = document.createElement("li");
    item.innerText = name + " - ₹" + price;
    list.appendChild(item);

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
